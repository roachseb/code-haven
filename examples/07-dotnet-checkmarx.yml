# ═══════════════════════════════════════════════════════════════
# Example 7 — .NET + Checkmarx + SQLFluff
# Enterprise .NET app with commercial SAST and SQL linting.
# ═══════════════════════════════════════════════════════════════
name: CI/CD
on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]

permissions:
  contents: write          # Checkout & releases
  checks: write            # dorny/test-reporter → check runs
  pull-requests: write     # PR annotations & comment updates
  packages: write          # Docker push to GHCR
  pages: write             # GitHub Pages deployment
  id-token: write          # OIDC (Pages, cloud logins)
  security-events: write   # SARIF upload (CodeQL, Trivy, KICS)
  actions: read            # Pages deployment token

jobs:
  ci:
    uses: code-haven/code-haven/.github/workflows/devsecops.yml@main
    with:
      dotnet_version: '8.0.x'
      sqlfluff_dialect: 'tsql'
      checkmarx_base_url: 'https://checkmarx.example.com'
      sonar_host_url: 'https://sonarqube.example.com'
      sonar_project_key: 'my-dotnet-api'
      # Disable unused stacks
      maven_disabled: true
      gradle_disabled: true
      npm_disabled: true
      python_disabled: true
      golang_disabled: true
      rust_disabled: true
      php_disabled: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      CHECKMARX_USERNAME: ${{ secrets.CX_USER }}
      CHECKMARX_PASSWORD: ${{ secrets.CX_PASS }}
