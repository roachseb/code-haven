name: 'Code Quality Config Generator'
description: 'Generates CodeClimate .codeclimate.yml based on detected languages — equivalent of templates/quality/'

inputs:
  config-path:
    description: 'Output path for .codeclimate.yml'
    required: false
    default: '.codeclimate.yml'
  extra-plugins:
    description: 'Comma-separated additional CodeClimate plugins to enable'
    required: false
    default: ''
  prefix:
    description: 'Path prefix for CodeClimate analysis'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Generate CodeClimate config
      shell: bash
      run: |
        echo "🔍 Detecting languages for CodeClimate configuration..."

        # Start YAML
        cat > "${{ inputs.config-path }}" << 'EOF'
        # Auto-generated by Code Haven Farm CI Templates
        # https://github.com/code-haven/code-haven
        version: "2"
        plugins:
        EOF

        PREFIX="${{ inputs.prefix }}"
        ENABLED=()

        # Detect languages and enable plugins
        if find . -name '*.py' -print -quit 2>/dev/null | grep -q .; then
          cat >> "${{ inputs.config-path }}" << EOF
          pylint:
            enabled: true
            channel: pylint-3
          radon:
            enabled: true
            config:
              threshold: C
          pep8:
            enabled: true
        EOF
          ENABLED+=("pylint" "radon" "pep8")
        fi

        if find . -name '*.go' -print -quit 2>/dev/null | grep -q .; then
          cat >> "${{ inputs.config-path }}" << EOF
          gofmt:
            enabled: true
          govet:
            enabled: true
          golint:
            enabled: true
        EOF
          ENABLED+=("gofmt" "govet" "golint")
        fi

        if find . -name '*.java' -print -quit 2>/dev/null | grep -q .; then
          cat >> "${{ inputs.config-path }}" << EOF
          pmd:
            enabled: true
            config:
              file: ${PREFIX:+$PREFIX/}pmd-ruleset.xml
          checkstyle:
            enabled: true
        EOF
          ENABLED+=("pmd" "checkstyle")
        fi

        if find . \( -name '*.js' -o -name '*.ts' -o -name '*.jsx' -o -name '*.tsx' \) -print -quit 2>/dev/null | grep -q .; then
          cat >> "${{ inputs.config-path }}" << EOF
          eslint:
            enabled: true
            channel: eslint-8
          nodesecurity:
            enabled: true
        EOF
          ENABLED+=("eslint" "nodesecurity")
        fi

        if find . -name '*.rb' -print -quit 2>/dev/null | grep -q .; then
          cat >> "${{ inputs.config-path }}" << EOF
          rubocop:
            enabled: true
            channel: rubocop-1-56-3
        EOF
          ENABLED+=("rubocop")
        fi

        if find . -name '*.php' -print -quit 2>/dev/null | grep -q .; then
          cat >> "${{ inputs.config-path }}" << EOF
          phpmd:
            enabled: true
          phpcodesniffer:
            enabled: true
        EOF
          ENABLED+=("phpmd" "phpcodesniffer")
        fi

        # Always enable these
        cat >> "${{ inputs.config-path }}" << EOF
          duplication:
            enabled: true
            config:
              languages:
        EOF

        # Add detected languages to duplication config
        [[ -n "$(find . -name '*.py' -print -quit)" ]] && echo "              python:" >> "${{ inputs.config-path }}"
        [[ -n "$(find . -name '*.java' -print -quit)" ]] && echo "              java:" >> "${{ inputs.config-path }}"
        [[ -n "$(find . -name '*.js' -print -quit)" ]] && echo "              javascript:" >> "${{ inputs.config-path }}"
        [[ -n "$(find . -name '*.go' -print -quit)" ]] && echo "              go:" >> "${{ inputs.config-path }}"
        [[ -n "$(find . -name '*.rb' -print -quit)" ]] && echo "              ruby:" >> "${{ inputs.config-path }}"
        [[ -n "$(find . -name '*.php' -print -quit)" ]] && echo "              php:" >> "${{ inputs.config-path }}"

        # Add exclude patterns
        cat >> "${{ inputs.config-path }}" << 'EOF'
        exclude_patterns:
          - "node_modules/"
          - "vendor/"
          - "target/"
          - "build/"
          - "dist/"
          - ".gradle/"
          - "__pycache__/"
          - "*.min.js"
          - "*.min.css"
          - "**/migrations/"
          - "**/test/"
          - "**/tests/"
          - "**/*_test.go"
          - "**/*Test.java"
        EOF

        echo ""
        echo "✅ Generated CodeClimate config with plugins: ${ENABLED[*]}"
        echo "📄 Config file: ${{ inputs.config-path }}"
        cat "${{ inputs.config-path }}"
