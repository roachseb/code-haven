# ═══════════════════════════════════════════════════════════════
# Code Haven — .NET Build Pipeline
# Internal reusable workflow — called from devsecops.yml
# ═══════════════════════════════════════════════════════════════
name: "🔷 .NET"

on:
  workflow_call:
    inputs:
      runner: { type: string, default: 'ubuntu-latest' }
      dotnet_disabled: { type: boolean, default: false }
      dotnet_version: { type: string, default: '8.0.x' }

jobs:
  dotnet-build:
    name: "🔷 .NET Build"
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ inputs.dotnet_version }}' }
      - run: dotnet restore
      - run: dotnet build --no-restore
      - name: Publish for Docker
        run: dotnet publish --no-build --configuration Release -o publish
      - name: Upload Docker inputs (.NET)
        uses: actions/upload-artifact@v4
        with:
          name: docker-input-dotnet
          path: publish/**
          if-no-files-found: ignore
          retention-days: 1

  dotnet-test:
    name: "🔷 .NET Test"
    needs: dotnet-build
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ inputs.dotnet_version }}' }
      - name: Test
        run: |
          dotnet test --no-build --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-results
          path: '**/TestResults'
          retention-days: 7

  dotnet-format:
    name: "🔷 .NET Format"
    runs-on: ${{ inputs.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ inputs.dotnet_version }}' }
      - run: dotnet format --verify-no-changes

  dotnet-publish:
    name: "🔷 .NET Publish (NuGet)"
    needs: dotnet-build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ inputs.dotnet_version }}' }
      - name: Pack & Push
        run: |
          dotnet pack --configuration Release -o packages
          dotnet nuget push packages/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }}
