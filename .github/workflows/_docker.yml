# ═══════════════════════════════════════════════════════════════
# Code Haven — Docker Pipeline (Build & Scan)
# Internal reusable workflow — called from devsecops.yml
# ═══════════════════════════════════════════════════════════════
name: "🐳 Docker"

on:
  workflow_call:
    inputs:
      runner: { type: string, default: 'ubuntu-latest' }
      docker_disabled: { type: boolean, default: false }
      container_scan_disabled: { type: boolean, default: false }
      dockerfile_path: { type: string, default: 'Dockerfile' }
      docker_context: { type: string, default: '.' }
      docker_tag_extra: { type: string, default: 'latest' }
      docker_registry: { type: string, default: 'ghcr.io' }

jobs:
  docker-build:
    name: "🐳 Docker Build & Push"
    if: ${{ !inputs.docker_disabled }}
    runs-on: ${{ inputs.runner }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      # ── Pull build artifacts into Docker context ────────
      - name: Check for docker-input artifacts
        id: docker_inputs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const res = await github.rest.actions.listWorkflowRunArtifacts({ owner, repo, run_id, per_page: 100 });
            const names = res.data.artifacts.map(a => a.name).filter(n => n.startsWith('docker-input-'));
            core.setOutput('found', names.length ? 'true' : 'false');
            core.setOutput('names', names.join(', '));
            core.info(`docker-input artifacts: ${names.join(', ') || '(none)'}`);

      - name: Download docker-input artifacts
        if: steps.docker_inputs.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.docker_context }}
          pattern: docker-input-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ inputs.docker_registry }}/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.docker_tag_extra }},enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Summary
        run: |
          {
            echo "## 🐳 Docker Image"
            echo ""
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "**Tags:**"
            echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  container-scan:
    name: "🔒 Container Scan (Trivy)"
    needs: docker-build
    if: always() && needs.docker-build.result == 'success' && !inputs.container_scan_disabled
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.docker_registry }}/${{ github.repository }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-results.sarif }
        continue-on-error: true
