# ═══════════════════════════════════════════════════════════════
# Code Haven — Documentation Site Deployment
# Builds and deploys the MkDocs documentation to GitHub Pages
# ═══════════════════════════════════════════════════════════════
name: "📚 Docs"

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "📚 Build Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Install MkDocs
        run: |
          pip install \
            mkdocs-material \
            mkdocs-minify-plugin \
            pymdown-extensions

      - name: Build site
        run: mkdocs build --strict --verbose --site-dir site

      - uses: actions/upload-pages-artifact@v3
        with: { path: site }

  deploy:
    name: "🚀 Deploy to Pages"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
