# ═══════════════════════════════════════════════════════════════
# Code Haven — Go Build Pipeline
# Internal reusable workflow — called from devsecops.yml
# ═══════════════════════════════════════════════════════════════
name: "🐹 Go"

on:
  workflow_call:
    inputs:
      runner: { type: string, default: 'ubuntu-latest' }
      golang_disabled: { type: boolean, default: false }
      golang_version: { type: string, default: 'stable' }

jobs:
  golang-build:
    name: "🐹 Go Build"
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ inputs.golang_version }}', cache: true }
      - run: go build ./...

  golang-test:
    name: "🐹 Go Test"
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ inputs.golang_version }}', cache: true }
      - name: Test with coverage
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile go-test-report.xml -- -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1 | awk '{print "**Go Coverage:** " $3}' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -html=coverage.out -o coverage.html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-reports
          path: |
            go-test-report.xml
            coverage.html
            coverage.out
          retention-days: 7
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Go Tests
          path: go-test-report.xml
          reporter: java-junit
          fail-on-error: false

  golang-lint:
    name: "🐹 Go Lint"
    runs-on: ${{ inputs.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ inputs.golang_version }}', cache: true }
      - uses: golangci/golangci-lint-action@v6

  golang-fmt:
    name: "🐹 Go Fmt"
    runs-on: ${{ inputs.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ inputs.golang_version }}', cache: true }
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [[ -n "$unformatted" ]]; then
            echo "::warning::Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

  golang-vet:
    name: "🐹 Go Vet"
    runs-on: ${{ inputs.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ inputs.golang_version }}', cache: true }
      - run: go vet ./...
