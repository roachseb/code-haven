# ═══════════════════════════════════════════════════════════════
# CI for the ci-templates repository itself
# Runs on every push/PR — validates YAML, builds the quality
# Docker image, and deploys MkDocs documentation.
# ═══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, 'feat/**']
    paths-ignore: ['**.md', 'LICENSE']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ┌────────────────────────────────────────────────────
  # │ Validate all YAML files
  # └────────────────────────────────────────────────────
  yaml-lint:
    name: "📋 YAML Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - run: pip install yamllint
      - run: yamllint -d relaxed .github/ actions/

  # ┌────────────────────────────────────────────────────
  # │ Validate GitHub Actions workflow syntax
  # └────────────────────────────────────────────────────
  actionlint:
    name: "🔍 Action Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true

  # ┌────────────────────────────────────────────────────
  # │ Build & push the quality Docker image
  # └────────────────────────────────────────────────────
  quality-image:
    name: "🐳 Quality Image"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: templates/quality
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/quality:main
            ghcr.io/${{ github.repository }}/quality:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ┌────────────────────────────────────────────────────
  # │ Link check on docs
  # └────────────────────────────────────────────────────
  links:
    name: "🔗 Link Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: '--verbose --no-progress --exclude-loopback --accept 200,403,401 **/*.md docs/**/*.md'
          fail: false

  # ┌────────────────────────────────────────────────────
  # │ Build & deploy MkDocs
  # └────────────────────────────────────────────────────
  docs:
    name: "📚 MkDocs"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x', cache: pip }
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict --verbose
      - uses: actions/upload-pages-artifact@v3
        with: { path: site }
      - id: deploy
        uses: actions/deploy-pages@v4

  # ┌────────────────────────────────────────────────────
  # │ Secret detection on the template repo itself
  # └────────────────────────────────────────────────────
  secrets:
    name: "🔑 Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
