# ═══════════════════════════════════════════════════════════════
# Code Haven — CI Pipeline  (dog-fooding our own system)
#
# This project IS the pipeline framework, so it USES its own
# devsecops.yml orchestrator to build, scan, and deploy itself.
#
# ┌────────────────────────────────────────────────────────────
# │ Lifecycle:
# │
# │  Push to main/master:
# │    → yaml-lint + actionlint (template-specific gates)
# │    → devsecops.yml auto-detects mkdocs.yml
# │      → builds docs, runs security/quality scans
# │      → deploys documentation to GitHub Pages
# │
# │  Pull Request:
# │    → same as above, minus Pages deploy
# │
# │  Tag push (v*):
# │    → same as above, PLUS:
# │      → creates GitHub Release with auto-changelog
# │      → packages & publishes based on detected stack
# │      → tags container images with semver
# │
# │  If you're looking for an example of "how do I consume
# │  Code Haven in my own repo?", this file IS that example.
# └────────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, master, 'feat/**']
    tags: ['v*', '[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Permissions ────────────────────────────────────────────
# Must be the UNION of all permissions any sub-workflow needs.
# GitHub Actions doesn't grant what you don't ask for here.
permissions:
  contents: write      # checkout + GitHub Release creation
  pages: write         # _pages.yml → GitHub Pages deploy
  id-token: write      # _pages.yml + PyPI trusted publisher
  security-events: write  # _security.yml → CodeQL SARIF upload
  actions: read        # _security.yml → CodeQL analysis
  packages: write      # _docker.yml + _release.yml → GHCR push

jobs:

  # ═══════════════════════════════════════════════════════════
  #  TEMPLATE-SPECIFIC — things only a CI-templates repo needs
  # ═══════════════════════════════════════════════════════════

  # ┌────────────────────────────────────────────────────
  # │ Validate all YAML files in the template repo
  # └────────────────────────────────────────────────────
  yaml-lint:
    name: "📋 YAML Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - run: pip install yamllint
      - run: yamllint -d relaxed .github/ actions/ examples/

  # ┌────────────────────────────────────────────────────
  # │ Validate GitHub Actions workflow / action syntax
  # └────────────────────────────────────────────────────
  actionlint:
    name: "🔍 Action Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true

  # ═══════════════════════════════════════════════════════════
  #  🐕  DOG-FOODING — Code Haven uses its own pipeline
  # ═══════════════════════════════════════════════════════════
  #
  #  This is the exact same call any consumer repo makes.
  #  devsecops.yml will:
  #    • detect mkdocs.yml   → build docs (Python sub-workflow)
  #    • detect *.md + docs/ → link check (Quality sub-workflow)
  #    • run Gitleaks, CodeQL, Trivy, KICS (Security sub-workflow)
  #    • compute code metrics via SCC (Quality sub-workflow)
  #    • deploy documentation to GitHub Pages (Pages sub-workflow)
  #    • on tag push: create GitHub Release (Release sub-workflow)
  #
  pipeline:
    needs: [yaml-lint, actionlint]
    if: always() && !cancelled()
    uses: ./.github/workflows/devsecops.yml
    permissions:
      contents: write        # checkout + GitHub Release creation
      pages: write           # GitHub Pages deploy
      id-token: write        # Pages + PyPI trusted publisher
      security-events: write # CodeQL SARIF upload
      actions: read          # CodeQL analysis
      packages: write        # GHCR push
    secrets: inherit
