# ═══════════════════════════════════════════════════════════════
# Code Haven — CI Pipeline  (dog-fooding our own system)
#
# This project IS the pipeline framework, so it USES its own
# devsecops.yml orchestrator to build, scan, and deploy itself.
#
# What happens when this runs:
#   1. Template-specific lints (YAML + Action syntax)
#   2. devsecops.yml kicks in, auto-detects mkdocs.yml
#      → builds the documentation site
#      → runs Gitleaks, CodeQL, Trivy, KICS, Lychee, SCC
#      → deploys to GitHub Pages on main
#
# If you're looking for an example of "how do I consume
# Code Haven in my own repo?", this file IS that example.
# ═══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Permissions ────────────────────────────────────────────
# Broad enough for every sub-workflow the pipeline delegates to:
#   pages + id-token  → _pages.yml  (GitHub Pages deploy)
#   security-events   → _security.yml  (CodeQL upload)
#   actions           → _security.yml  (CodeQL analysis)
#   packages          → (reserved for future Docker image)
#   contents          → checkout
permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write
  actions: read

jobs:

  # ═══════════════════════════════════════════════════════════
  #  TEMPLATE-SPECIFIC — things only a CI-templates repo needs
  # ═══════════════════════════════════════════════════════════

  # ┌────────────────────────────────────────────────────
  # │ Validate all YAML files in the template repo
  # └────────────────────────────────────────────────────
  yaml-lint:
    name: "📋 YAML Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - run: pip install yamllint
      - run: yamllint -d relaxed .github/ actions/ examples/

  # ┌────────────────────────────────────────────────────
  # │ Validate GitHub Actions workflow / action syntax
  # └────────────────────────────────────────────────────
  actionlint:
    name: "🔍 Action Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true

  # ═══════════════════════════════════════════════════════════
  #  🐕  DOG-FOODING — Code Haven uses its own pipeline
  # ═══════════════════════════════════════════════════════════
  #
  #  This is the exact same call any consumer repo makes.
  #  devsecops.yml will:
  #    • detect mkdocs.yml   → build docs (Python sub-workflow)
  #    • detect *.md + docs/ → link check (Quality sub-workflow)
  #    • run Gitleaks, CodeQL, Trivy, KICS (Security sub-workflow)
  #    • compute code metrics via SCC (Quality sub-workflow)
  #    • deploy documentation to GitHub Pages (Pages sub-workflow)
  #
  pipeline:
    needs: [yaml-lint, actionlint]
    uses: ./.github/workflows/devsecops.yml
    permissions:
      contents: read
      pages: write
      id-token: write
      security-events: write
      actions: read
    secrets: inherit
